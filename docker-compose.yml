version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: merchberry_postgres
    restart: always
    environment:
      POSTGRES_USER: merchberry_user
      POSTGRES_PASSWORD: merchberry_password
      POSTGRES_DB: merchberry_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: